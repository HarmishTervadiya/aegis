[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
aegis = "JDnMTnXL1iAnhvVC2j4C32yzd6NxxH7SszuJw1tAjG7u"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[idls]
marginfi = "programs/aegis/idls/marginfi_stripped.json"
kamino_lend = "programs/aegis/idls/kamino_lend_stripped.json"
