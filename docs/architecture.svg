<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117">

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Off-chain container -->
<rect x="30" y="30" width="220" height="300" rx="14" fill="#1e2030" stroke="#4b5563" stroke-width="0.5"/>
<text x="140" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#e5e7eb">Off-chain</text>
<text x="140" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">The Watcher</text>

<!-- Indexer -->
<rect x="54" y="92" width="172" height="52" rx="8" fill="#2a2d3e" stroke="#4b5563" stroke-width="0.5"/>
<text x="140" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#e5e7eb">Node.js indexer</text>
<text x="140" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">polls every 15s via RPC</text>

<!-- Evaluator -->
<rect x="54" y="162" width="172" height="52" rx="8" fill="#2a2d3e" stroke="#4b5563" stroke-width="0.5"/>
<text x="140" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#e5e7eb">Condition evaluator</text>
<text x="140" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">checks Defense / Offense</text>

<!-- Crank -->
<rect x="54" y="232" width="172" height="52" rx="8" fill="#2a2d3e" stroke="#4b5563" stroke-width="0.5"/>
<text x="140" y="254" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#e5e7eb">Permissionless crank</text>
<text x="140" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">sends execute_trigger tx</text>

<!-- Arrows inside off-chain -->
<line x1="140" y1="144" x2="140" y2="160" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="140" y1="214" x2="140" y2="230" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- On-chain container -->
<rect x="290" y="30" width="360" height="380" rx="14" fill="#1a1528" stroke="#6d28d9" stroke-width="0.5"/>
<text x="470" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#e5e7eb">On-chain</text>
<text x="470" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa">Anchor program — Rust</text>

<!-- execute_trigger -->
<rect x="314" y="88" width="312" height="96" rx="8" fill="#2d1f5e" stroke="#7c3aed" stroke-width="1"/>
<text x="470" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#c4b5fd">execute_trigger</text>
<text x="470" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa">1. verify owner = protocol program ID</text>
<text x="470" y="146" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa">2. deserialize raw account bytes on-chain</text>
<text x="470" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa">3. compute utilization bps in Rust</text>

<!-- require! gate -->
<rect x="354" y="204" width="232" height="44" rx="8" fill="#3b1515" stroke="#dc2626" stroke-width="0.5"/>
<text x="470" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#fca5a5">require! condition gate</text>
<text x="470" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f87171">reverts if not met — no trust</text>

<!-- State accounts -->
<rect x="314" y="268" width="88" height="52" rx="8" fill="#0f2a1e" stroke="#059669" stroke-width="0.5"/>
<text x="358" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#6ee7b7">UserVault</text>
<text x="358" y="306" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#34d399">USDC custody</text>

<rect x="416" y="268" width="88" height="52" rx="8" fill="#0f2a1e" stroke="#059669" stroke-width="0.5"/>
<text x="460" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#6ee7b7">TriggerConfig</text>
<text x="460" y="306" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#34d399">mode + active</text>

<rect x="518" y="268" width="88" height="52" rx="8" fill="#0f2a1e" stroke="#059669" stroke-width="0.5"/>
<text x="562" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#6ee7b7">TriggerLog</text>
<text x="562" y="306" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#34d399">immutable record</text>

<!-- Arrows inside on-chain -->
<line x1="470" y1="184" x2="470" y2="202" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
<line x1="470" y1="248" x2="470" y2="266" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- CPI label -->
<text x="470" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">atomic CPI: withdraw then deposit</text>
<line x1="470" y1="322" x2="470" y2="356" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- External protocols -->
<rect x="314" y="370" width="148" height="52" rx="8" fill="#2a1f08" stroke="#d97706" stroke-width="0.5"/>
<text x="388" y="392" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#fcd34d">MarginFi</text>
<text x="388" y="408" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fbbf24">lending_account_withdraw</text>

<rect x="478" y="370" width="148" height="52" rx="8" fill="#2a1f08" stroke="#d97706" stroke-width="0.5"/>
<text x="552" y="392" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#fcd34d">Kamino</text>
<text x="552" y="408" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fbbf24">deposit_reserve_liquidity</text>

<!-- Main crank arrow -->
<path d="M 226 258 L 260 258 L 260 136 L 312 136" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="258" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">crank tx</text>

<!-- RPC read from indexer to bottom accounts -->
<path d="M 140 332 L 140 490 L 312 490" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="90" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">RPC</text>
<text x="90" y="505" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">reads</text>

<!-- Bottom account boxes -->
<rect x="314" y="468" width="148" height="44" rx="8" fill="#1e2030" stroke="#4b5563" stroke-width="0.5"/>
<text x="388" y="487" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#e5e7eb">MarginFi Bank</text>
<text x="388" y="503" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">3uxNep... (live)</text>

<rect x="478" y="468" width="148" height="44" rx="8" fill="#1e2030" stroke="#4b5563" stroke-width="0.5"/>
<text x="552" y="487" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#e5e7eb">Kamino Reserve</text>
<text x="552" y="503" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">d4A2pr... (live)</text>

<!-- Dashed line between bottom account boxes -->
<line x1="462" y1="490" x2="478" y2="490" stroke="#374151" stroke-width="1" stroke-dasharray="4 3"/>

<!-- execute_trigger reads remaining_accounts -->
<path d="M 470 422 L 470 450 L 388 450 L 388 466" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 470 450 L 552 450 L 552 466" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="30" y="492" width="10" height="10" rx="2" fill="#4c1d95" stroke="#7c3aed" stroke-width="0.5"/>
<text x="46" y="502" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">on-chain Rust</text>
<rect x="30" y="510" width="10" height="10" rx="2" fill="#1e2030" stroke="#4b5563" stroke-width="0.5"/>
<text x="46" y="520" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">off-chain Node.js</text>
<line x1="30" y1="535" x2="44" y2="535" stroke="#374151" stroke-width="1" stroke-dasharray="4 3"/>
<text x="50" y="539" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">RPC / account read</text>
<line x1="150" y1="535" x2="164" y2="535" stroke="#6b7280" stroke-width="1.5"/>
<text x="170" y="539" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">transaction / CPI</text>

</svg>
